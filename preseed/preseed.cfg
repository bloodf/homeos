# HomeOS preseed for Debian 13.4 (Trixie) — fully unattended netinst.
# Embedded into initrd by build/repack-iso.sh.

#### Locale & keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

#### Network (DHCP)
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string homeos
d-i netcfg/get_domain string local
d-i netcfg/wireless_wep string

#### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

#### Time
d-i clock-setup/utc boolean true
d-i time/zone string America/Sao_Paulo
d-i clock-setup/ntp boolean true

#### Accounts — root disabled, admin user created with disabled password (key-only)
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string admin
d-i passwd/username string admin
d-i passwd/user-password-crypted password !
d-i passwd/user-default-groups string audio cdrom dip floppy plugdev sudo render video
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

#### Partitioning — disk 1 only (LVM, ext4); disk 2 handled in late_command
d-i partman-auto/disk string /dev/sda
d-i partman-auto/method string lvm
d-i partman-auto-lvm/new_vg_name string vg0

d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto-lvm/guided_size string max

d-i partman-auto/expert_recipe string                         \
      homeos-os ::                                            \
              1024 1024 1024 ext4                             \
                      $primary{ } $bootable{ }                \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ /boot }                     \
              .                                               \
              20000 50000 -1 ext4                             \
                      $lvmok{ }                               \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ / }                         \
              .

d-i partman-basicfilesystems/no_swap boolean false
d-i partman-auto/choose_recipe select homeos-os
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

#### Base + tasks
d-i base-installer/install-recommends boolean false
d-i apt-setup/use_mirror boolean true
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string security.debian.org
d-i pkgsel/upgrade select full-upgrade
d-i pkgsel/update-policy select unattended-upgrades

tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string openssh-server curl ca-certificates gnupg git ansible sudo lvm2 cryptsetup parted rsync

popularity-contest popularity-contest/participate boolean false

#### Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string /dev/sda

#### Finish
d-i finish-install/reboot_in_progress note

#### late_command — copy authorized_keys, sudoers, payload, firstboot, second disk LVM
d-i preseed/late_command string \
  in-target install -d -m 700 -o admin -g admin /home/admin/.ssh ; \
  in-target sh -c 'cp /cdrom/homeos/secrets/authorized_keys /home/admin/.ssh/authorized_keys' ; \
  in-target chown admin:admin /home/admin/.ssh/authorized_keys ; \
  in-target chmod 600 /home/admin/.ssh/authorized_keys ; \
  in-target sh -c 'echo "admin ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/admin && chmod 440 /etc/sudoers.d/admin' ; \
  in-target sh -c 'cp -a /cdrom/homeos /opt/homeos && chown -R root:root /opt/homeos' ; \
  in-target install -m 644 /opt/homeos/bootstrap/files/homeos-firstboot.service /etc/systemd/system/homeos-firstboot.service ; \
  in-target systemctl enable homeos-firstboot.service ; \
  in-target sh -c 'if [ -b /dev/sdb ]; then \
        wipefs -af /dev/sdb && \
        pvcreate -ff -y /dev/sdb && \
        vgcreate vg1 /dev/sdb && \
        lvcreate -L 16G -n swap vg1 && \
        mkswap /dev/vg1/swap && \
        echo "/dev/vg1/swap none swap sw 0 0" >> /etc/fstab && \
        lvcreate -l 100%FREE -n cache vg1 ; \
      fi' || true
