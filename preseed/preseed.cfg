# HomeOS preseed for Debian 13.4 (Trixie) — fully unattended netinst.
# Embedded into initrd by build/repack-iso.sh.

#### Locale & keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

#### Network (DHCP)
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string homeos
d-i netcfg/get_domain string local
d-i netcfg/wireless_wep string

#### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

#### Time
d-i clock-setup/utc boolean true
d-i time/zone string America/Sao_Paulo
d-i clock-setup/ntp boolean true

#### Accounts — root disabled; d-i creates temp user, late_command renames to admin.
# Debian reserves the username "admin" in user-setup. Keep the supported
# root-disabled first-user flow with a non-reserved temporary login, then rename
# it to the project-standard admin account after user-setup completes.
# Default password is EXPIRED in late_command — first SSH login is forced to change it.
# After first key is uploaded, run `sudo homeos secure` to disable password auth.
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string admin
d-i passwd/username string diadmin
d-i passwd/user-password password homeos
d-i passwd/user-password-again password homeos
d-i passwd/user-default-groups string audio cdrom dip floppy plugdev sudo render video
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

#### Partitioning — disk 1 only (LVM, ext4); disk 2 handled in late_command
# Select disks dynamically so the ISO works on bare metal (/dev/sdX, /dev/nvme*)
# and QEMU virtio (/dev/vdX). The first installer-visible disk is the OS disk;
# the optional second disk is prepared later for swap/cache.
d-i partman/early_command string \
  os_disk="$(list-devices disk | head -n 1)"; \
  debconf-set partman-auto/disk "$os_disk"; \
  debconf-set grub-installer/bootdev "$os_disk"
d-i partman-auto/method string lvm
d-i partman-auto-lvm/new_vg_name string vg0

d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto-lvm/guided_size string max

d-i partman-auto/expert_recipe string                         \
      homeos-os ::                                            \
              1024 1024 1024 ext4                             \
                      $primary{ } $bootable{ }                \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ /boot }                     \
              .                                               \
              20000 50000 -1 ext4                             \
                      $lvmok{ }                               \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ / }                         \
              .

d-i partman-basicfilesystems/no_swap boolean false
d-i partman-auto/choose_recipe select homeos-os
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

#### Base + tasks
d-i base-installer/install-recommends boolean false
d-i apt-setup/use_mirror boolean true
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string security.debian.org
d-i pkgsel/upgrade select full-upgrade
d-i pkgsel/update-policy select unattended-upgrades

tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string openssh-server curl ca-certificates gnupg git ansible sudo lvm2 cryptsetup parted rsync

popularity-contest popularity-contest/participate boolean false

#### Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
# Set dynamically in partman/early_command.

#### Finish
d-i finish-install/reboot_in_progress note

#### late_command — sudoers, payload, firstboot
# authorized_keys is OPTIONAL — only copied if shipped with the ISO. Public builds ship
# with no key; admin uses default password "homeos" once and firstboot expires it
# after bootstrap completes.
d-i preseed/late_command string \
  /bin/sh -c 'set -e; rm -rf /target/opt/homeos; mkdir -p /target/opt; cp -a /cdrom/homeos /target/opt/homeos; chown -R root:root /target/opt/homeos' ; \
  echo $? > /tmp/homeos-late-required.status ; \
  if [ "$(cat /tmp/homeos-late-required.status)" = 0 ]; then \
    in-target sh -c 'set -e; \
          usermod -l admin -d /home/admin -m diadmin; \
          if getent group diadmin >/dev/null && ! getent group admin >/dev/null; then groupmod -n admin diadmin; fi; \
          getent group admin >/dev/null || groupadd admin; \
          usermod -g admin admin; \
          for g in sudo audio cdrom dip floppy plugdev render video; do getent group "$g" >/dev/null && usermod -aG "$g" admin || true; done; \
          install -d -m 700 -o admin -g admin /home/admin/.ssh; \
          chown -R admin:admin /home/admin; \
          if [ -s /opt/homeos/secrets/authorized_keys ]; then \
            cp /opt/homeos/secrets/authorized_keys /home/admin/.ssh/authorized_keys; \
            chown admin:admin /home/admin/.ssh/authorized_keys; \
            chmod 600 /home/admin/.ssh/authorized_keys; \
          fi; \
          printf "%s\n" "admin ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/admin; \
          chmod 440 /etc/sudoers.d/admin; \
          visudo -cf /etc/sudoers.d/admin; \
          install -m 644 /opt/homeos/bootstrap/files/homeos-firstboot.service /etc/systemd/system/homeos-firstboot.service; \
          systemctl enable homeos-firstboot.service' ; \
    echo $? > /tmp/homeos-late-required.status ; \
  fi ; \
  test "$(cat /tmp/homeos-late-required.status)" = 0
