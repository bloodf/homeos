default homeos
prompt 0
timeout 30
serial 0 115200

label homeos
    menu label HomeOS install (auto)
    kernel /install.amd/vmlinuz
    append auto=true priority=critical preseed/file=/preseed.cfg vga=788 console=tty0 console=ttyS0,115200n8 initrd=/install.amd/initrd.gz --- quiet

label rescue
    menu label HomeOS rescue / manual install
    kernel /install.amd/vmlinuz
    append rescue/enable=true vga=788 initrd=/install.amd/initrd.gz ---
