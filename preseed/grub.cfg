if loadfont $prefix/font.pf2 ; then
  set gfxmode=auto
  insmod efi_gop
  insmod efi_uga
  insmod gfxterm
  terminal_output gfxterm
fi

set timeout=3
set default=0

menuentry --hotkey=h "HomeOS install (auto)" {
    set background_color=black
    linux /install.amd/vmlinuz auto=true priority=critical preseed/file=/preseed.cfg \
        console=tty0 console=ttyS0,115200n8 \
        DEBIAN_FRONTEND=noninteractive --- quiet
    initrd /install.amd/initrd.gz
}

menuentry "HomeOS install (rescue / manual)" {
    set background_color=black
    linux /install.amd/vmlinuz rescue/enable=true ---
    initrd /install.amd/initrd.gz
}
