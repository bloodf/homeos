---
- name: Stacks base dir
  ansible.builtin.file:
    path: /opt/stacks
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0755'

- name: Per-stack directories
  ansible.builtin.file:
    path: "/opt/stacks/{{ item.name }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0755'
  loop: "{{ stacks }}"
  when: item.enabled

- name: Check for GPU device passthrough
  ansible.builtin.stat:
    path: /dev/dri
  register: homeos_dev_dri

- name: Render stack compose files
  ansible.builtin.template:
    src: "stacks/{{ item.name }}/docker-compose.yml.j2"
    dest: "/opt/stacks/{{ item.name }}/docker-compose.yml"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0644'
  loop: "{{ stacks }}"
  when: item.enabled

- name: Ensure data dirs exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0755'
  loop:
    - /srv/homeassistant
    - /srv/jellyfin/config
    - /srv/jellyfin/cache
    - /srv/vaultwarden
    - /srv/nas/media

- name: Bring up enabled stacks
  ansible.builtin.shell: |
    cd /opt/stacks/{{ item.name }} && docker compose up -d
  args:
    executable: /bin/bash
  loop: "{{ stacks }}"
  when: item.enabled
  register: stack_up
  changed_when: "'Started' in (stack_up.stdout | default(''))"
