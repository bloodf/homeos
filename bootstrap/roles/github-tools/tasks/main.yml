---
- name: Tools base dir
  ansible.builtin.file:
    path: /opt/tools
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Clone tools
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ item.dest | default('/opt/tools/' + item.name) }}"
    version: "{{ item.ref }}"
    force: true
  become_user: "{{ admin_user }}"
  loop: "{{ github_tools }}"

- name: Build node tools
  ansible.builtin.shell: |
    timeout 300 bash -lc '
      set -e
      cd "{{ item.dest | default('/opt/tools/' + item.name) }}"
      if [ -f pnpm-lock.yaml ]; then
        pnpm install --prod=false || pnpm install
        pnpm run build 2>/dev/null || true
      elif [ -f package-lock.json ]; then
        npm ci || npm install
        npm run build 2>/dev/null || true
      elif [ -f package.json ]; then
        npm install
        npm run build 2>/dev/null || true
      fi
    ' || true
  args:
    executable: /bin/bash
  become_user: "{{ admin_user }}"
  loop: "{{ github_tools | selectattr('build','equalto','node') | list }}"
  failed_when: false

- name: Build pipx tools
  ansible.builtin.shell: |
    timeout 180 bash -lc '
      set -e
      cd "{{ item.dest | default('/opt/tools/' + item.name) }}"
      pipx install --force . || true
    ' || true
  args:
    executable: /bin/bash
  become_user: "{{ admin_user }}"
  loop: "{{ github_tools | selectattr('build','equalto','pipx') | list }}"
  failed_when: false

- name: Build "auto" tools (try cargo, then npm)
  ansible.builtin.shell: |
    timeout 300 bash -lc '
      set -e
      cd "{{ item.dest | default('/opt/tools/' + item.name) }}"
      if [ -f Cargo.toml ]; then
        cargo install --path . || true
      elif [ -f package.json ]; then
        pnpm install || npm install
        pnpm run build 2>/dev/null || npm run build 2>/dev/null || true
      fi
    ' || true
  args:
    executable: /bin/bash
  become_user: "{{ admin_user }}"
  loop: "{{ github_tools | selectattr('build','equalto','auto') | list }}"
  failed_when: false

- name: Bring up compose-based tools
  ansible.builtin.shell: |
    timeout 300 bash -lc '
      set -e
      cd "{{ item.dest | default('/opt/tools/' + item.name) }}"
      if [ -f docker-compose.yml ] || [ -f compose.yaml ]; then
        docker compose up -d
      fi
    ' || true
  args:
    executable: /bin/bash
  loop: "{{ github_tools | selectattr('build','equalto','compose') | list }}"
  failed_when: false

- name: Install claude-mem (Claude Code, Codex, Cursor only)
  ansible.builtin.shell: |
    timeout 300 bash -lc '
      set -e
      cd /opt/tools/claude-mem
      if [ -f package.json ]; then
        pnpm install || npm install
        # claude-mem ships installers for specific clients; restrict to allowed targets
        for tgt in claude-code codex cursor; do
          npx claude-mem install --client "$tgt" 2>/dev/null || true
        done
      fi
    ' || true
  args:
    executable: /bin/bash
  become_user: "{{ admin_user }}"
  failed_when: false
