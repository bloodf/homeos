---
- name: Harden sshd_config
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-homeos.conf
    mode: '0644'
    content: |
      # HomeOS SSH — public distro defaults.
      # PasswordAuthentication stays ON until operator runs `sudo homeos secure`,
      # which flips this to no and locks the admin password.
      PasswordAuthentication yes
      PermitRootLogin no
      KbdInteractiveAuthentication no
      UsePAM yes
      MaxAuthTries 4
      LoginGraceTime 30
      X11Forwarding no
      AllowAgentForwarding yes
      ClientAliveInterval 60
      ClientAliveCountMax 5
  notify: restart sshd

- name: Ensure sshd enabled
  ansible.builtin.systemd:
    name: ssh
    enabled: true
    state: started
