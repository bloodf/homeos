---
- name: reload udev
  ansible.builtin.command: udevadm control --reload-rules
  changed_when: false

- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart smbd
  ansible.builtin.systemd:
    name: smbd
    state: restarted

- name: reload nfs
  ansible.builtin.command: exportfs -ra
  changed_when: false
