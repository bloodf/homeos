---
- name: Enable non-free + non-free-firmware
  ansible.builtin.replace:
    path: /etc/apt/sources.list
    regexp: '^(deb .* main)( contrib)?( non-free)?( non-free-firmware)?$'
    replace: '\1 contrib non-free non-free-firmware'

- name: Install Intel media drivers
  ansible.builtin.apt:
    update_cache: true
    name:
      - intel-media-va-driver-non-free
      - i965-va-driver
      - vainfo
      - intel-gpu-tools
      - libva-drm2
      - libva2
    state: present

- name: Add admin to render + video groups
  ansible.builtin.user:
    name: "{{ admin_user }}"
    groups: render,video
    append: true

- name: Verify VAAPI iHD driver
  ansible.builtin.shell: vainfo 2>/dev/null | grep -E 'iHD|i965' || true
  register: vainfo_out
  changed_when: false

- name: Report GPU status
  ansible.builtin.debug:
    msg: "VAAPI: {{ vainfo_out.stdout | default('not detected') }}"
