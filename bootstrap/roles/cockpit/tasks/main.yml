---
- name: Install Cockpit core
  ansible.builtin.apt:
    name:
      - cockpit
      - cockpit-storaged
      - cockpit-networkmanager
      - cockpit-podman
      - cockpit-packagekit
    state: present

- name: 45Drives keyring dir
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: 45Drives sources file
  ansible.builtin.get_url:
    url: "{{ cockpit_45drives_repo }}"
    dest: /etc/apt/sources.list.d/45drives.sources
    mode: '0644'

- name: Install 45Drives Cockpit modules
  ansible.builtin.apt:
    update_cache: true
    name:
      - cockpit-file-sharing
      - cockpit-navigator
      - cockpit-identities
    state: present
  failed_when: false   # 45Drives sources package list may differ across releases

- name: Enable cockpit.socket
  ansible.builtin.systemd:
    name: cockpit.socket
    enabled: true
    state: started
