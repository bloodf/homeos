---
- name: Brew prerequisites
  ansible.builtin.apt:
    name:
      - build-essential
      - procps
      - file
      - git
    state: present

- name: Install Homebrew (Linuxbrew)
  ansible.builtin.shell: |
    set -e
    if [ ! -x /home/linuxbrew/.linuxbrew/bin/brew ]; then
      NONINTERACTIVE=1 su - {{ admin_user }} -c '/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
    fi
  args:
    executable: /bin/bash
    creates: /home/linuxbrew/.linuxbrew/bin/brew

- name: Install brew formulas
  ansible.builtin.shell: |
    set -e
    eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
    brew install {{ brew_formulas | join(' ') }}
  args:
    executable: /bin/bash
  become_user: "{{ admin_user }}"
  register: brew_install
  changed_when: "'Pouring' in brew_install.stdout or 'Installing' in brew_install.stdout"
  failed_when: brew_install.rc != 0
