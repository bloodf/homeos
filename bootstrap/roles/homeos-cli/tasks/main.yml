---
- name: Install homeos CLI
  ansible.builtin.copy:
    src: homeos
    dest: /usr/local/bin/homeos
    mode: "0755"

- name: Install bash completion
  ansible.builtin.copy:
    src: homeos.bash-completion
    dest: /etc/bash_completion.d/homeos
    mode: "0644"

- name: Install zsh completion
  ansible.builtin.copy:
    src: _homeos
    dest: /usr/local/share/zsh/site-functions/_homeos
    mode: "0644"

- name: Install audit replay sidecar prune helper
  ansible.builtin.copy:
    src: homeos-audit-prune
    dest: /usr/local/sbin/homeos-audit-prune
    mode: "0755"

- name: Secrets dir for admin
  ansible.builtin.file:
    path: "{{ admin_home }}/.config/homeos"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0700"

- name: HomeOS state dirs
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /var/lib/homeos
    - /var/lib/homeos/installed.d
    - /var/lib/homeos/pending
    - /var/lib/homeos/stack-digests

- name: Root-only audit replay sidecar dir
  ansible.builtin.file:
    path: /var/lib/homeos/audit-replay
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Default AI gate provider (none)
  ansible.builtin.copy:
    dest: /var/lib/homeos/ai-gate-provider
    content: "none\n"
    mode: "0644"
    force: false

- name: Audit log
  ansible.builtin.file:
    path: /var/log/homeos-audit.jsonl
    state: touch
    mode: "0644"
    modification_time: preserve
    access_time: preserve

- name: Audit log rotation
  ansible.builtin.copy:
    dest: /etc/logrotate.d/homeos-audit
    mode: "0644"
    content: |
      /var/log/homeos-audit.jsonl {
          weekly
          rotate 520
          compress
          missingok
          notifempty
          create 0644 root root
      }

- name: Audit replay sidecar prune service
  ansible.builtin.copy:
    dest: /etc/systemd/system/homeos-audit-prune.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prune HomeOS audit replay sidecars older than 90 days

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/homeos-audit-prune

- name: Audit replay sidecar prune timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/homeos-audit-prune.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Daily HomeOS audit replay sidecar pruning

      [Timer]
      OnCalendar=daily
      Persistent=true
      RandomizedDelaySec=30m

      [Install]
      WantedBy=timers.target

- name: Enable audit replay sidecar prune timer
  ansible.builtin.systemd:
    name: homeos-audit-prune.timer
    enabled: true
    state: started
    daemon_reload: true

- name: Installer scripts dir
  ansible.builtin.file:
    path: /opt/homeos/bootstrap/installers
    state: directory
    mode: "0755"

- name: Mark installer scripts executable
  ansible.builtin.file:
    path: "/opt/homeos/bootstrap/installers/{{ item }}"
    mode: "0755"
  loop:
    - ai-keys.sh
    - ollama.sh
    - mcp-hub.sh
    - monitoring.sh
    - media-stack.sh
    - offsite-backup.sh
    - image-gen.sh
    - voice.sh
  failed_when: false

- name: Empty secrets file
  ansible.builtin.copy:
    dest: "{{ admin_home }}/.config/homeos/secrets.env"
    content: "# HomeOS secrets — populated by `homeos config secrets set KEY=VAL`\n"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0600"
    force: false
