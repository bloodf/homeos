---
- name: Tailscale apt key
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/{{ tailscale_channel }}/debian/{{ ansible_distribution_release }}.noarmor.gpg"
    dest: /etc/apt/keyrings/tailscale-archive-keyring.gpg
    mode: '0644'

- name: Tailscale apt repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/tailscale.list
    mode: '0644'
    content: |
      deb [signed-by=/etc/apt/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/{{ tailscale_channel }}/debian {{ ansible_distribution_release }} main

- name: Install tailscale
  ansible.builtin.apt:
    update_cache: true
    name: tailscale
    state: present

- name: Enable tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Enable IP forwarding for subnet routing
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.val }}"
    state: present
    sysctl_set: true
    reload: true
  loop:
    - { key: net.ipv4.ip_forward, val: '1' }
    - { key: net.ipv6.conf.all.forwarding, val: '1' }
