---
- name: Apt full upgrade
  ansible.builtin.apt:
    update_cache: true
    upgrade: full
    cache_valid_time: 3600

- name: Install base utilities
  ansible.builtin.apt:
    name:
      - vim
      - tmux
      - htop
      - btop
      - ncdu
      - rsync
      - unzip
      - jq
      - fzf
      - ripgrep
      - build-essential
      - ca-certificates
      - gnupg
      - lsb-release
      - pciutils
      - usbutils
      - smartmontools
      - lm-sensors
      - cron
      - python3-pip
      - python3-venv
      - pipx
      - ufw
      - fail2ban
      - unattended-upgrades
      - apt-listchanges
    state: present

- name: Configure unattended-upgrades (security only)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/52homeos-unattended
    mode: '0644'
    content: |
      Unattended-Upgrade::Origins-Pattern {
        "origin=Debian,codename=${distro_codename},label=Debian-Security";
      };
      Unattended-Upgrade::Automatic-Reboot "false";

- name: UFW default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: UFW allow homeos TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item | string }}"
    proto: tcp
  loop: "{{ firewall_allow_tcp }}"

- name: UFW allow homeos UDP ports
  community.general.ufw:
    rule: allow
    port: "{{ item | string }}"
    proto: udp
  loop: "{{ firewall_allow_udp | default([]) }}"

- name: UFW allow tailscale interface
  community.general.ufw:
    rule: allow
    interface: tailscale0
    direction: in

- name: UFW enable
  community.general.ufw:
    state: enabled
    logging: low

- name: Fail2ban sshd jail
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/homeos-sshd.local
    mode: '0644'
    content: |
      [sshd]
      enabled = true
      maxretry = 3
      bantime = 1h
  notify: restart fail2ban

- name: Enable timesyncd
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started

- name: Attach LVM cache to vg0/root if cache LV present
  ansible.builtin.shell: |
    set -e
    if lvs vg1/cache >/dev/null 2>&1 && ! lvs vg0/root --noheadings -o segtype | grep -q cache; then
      lvconvert --type cache --cachepool vg1/cache vg0/root --yes
    fi
  args:
    executable: /bin/bash
  register: cache_attach
  changed_when: "'logical volume vg0/root is now' in (cache_attach.stdout | default(''))"
  failed_when: false
