---
- name: NodeSource GPG key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"

- name: NodeSource apt repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/nodesource.list
    mode: "0644"
    content: |
      deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ node_major }}.x nodistro main

- name: Install Node.js
  ansible.builtin.apt:
    update_cache: true
    name: nodejs
    state: present

- name: Verify node major version
  ansible.builtin.shell: "node -v | grep -q '^v{{ node_major }}\\.'"
  changed_when: false

- name: Enable corepack
  ansible.builtin.command: corepack enable
  changed_when: false

- name: Install pnpm via corepack
  ansible.builtin.command: corepack prepare pnpm@latest --activate
  changed_when: false

- name: Install bun for admin
  ansible.builtin.shell: |
    set -e
    if [ ! -x "{{ admin_home }}/.bun/bin/bun" ]; then
      tmp="$(mktemp)"
      trap 'rm -f "$tmp"' EXIT
      curl -fsSL -o "$tmp" https://bun.sh/install
      chmod 0644 "$tmp"
      su - {{ admin_user }} -c "bash '$tmp'"
    fi
  args:
    executable: /bin/bash
    creates: "{{ admin_home }}/.bun/bin/bun"
