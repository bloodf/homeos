---
# HomeOS Portal — toggle-aware web UI for AI tools and services.
#
# Stack stays installed but does NOT auto-start. Operator opts in via:
#   sudo homeos config portal on
# Disable with:
#   sudo homeos config portal off
#
# A flag file at /var/lib/homeos/portal.enabled determines whether bootstrap
# brings the stack up on this run.

- name: Portal directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0755'
  loop:
    - /opt/stacks/portal
    - /srv/portal
    - /srv/portal/homepage
    - /srv/portal/open-webui
    - /srv/portal/dockge
    - /srv/portal/filebrowser

- name: Filebrowser database touch
  ansible.builtin.file:
    path: /srv/portal/filebrowser/database.db
    state: touch
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0644'
    modification_time: preserve
    access_time: preserve

- name: Capture admin uid/gid
  ansible.builtin.getent:
    database: passwd
    key: "{{ admin_user }}"

- name: Set uid/gid facts
  ansible.builtin.set_fact:
    admin_user_uid: "{{ getent_passwd[admin_user][1] }}"
    admin_user_gid: "{{ getent_passwd[admin_user][2] }}"

- name: Portal docker-compose
  ansible.builtin.template:
    src: portal-compose.yml.j2
    dest: /opt/stacks/portal/docker-compose.yml
    mode: '0644'

- name: Homepage configs
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/srv/portal/homepage/{{ item.dest }}"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0644'
  loop:
    - { src: "homepage-settings.yaml.j2",  dest: "settings.yaml" }
    - { src: "homepage-services.yaml.j2",  dest: "services.yaml" }
    - { src: "homepage-widgets.yaml.j2",   dest: "widgets.yaml" }
    - { src: "homepage-bookmarks.yaml.j2", dest: "bookmarks.yaml" }
    - { src: "homepage-docker.yaml.j2",    dest: "docker.yaml" }

- name: Filebrowser settings
  ansible.builtin.template:
    src: filebrowser-settings.json.j2
    dest: /srv/portal/filebrowser/settings.json
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0644'

- name: ttyd launcher script
  ansible.builtin.template:
    src: launch.sh.j2
    dest: /srv/portal/launch.sh
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0755'

- name: Check portal enable flag
  ansible.builtin.stat:
    path: /var/lib/homeos/portal.enabled
  register: portal_flag

- name: Bring portal stack up (only if enabled)
  community.docker.docker_compose_v2:
    project_src: /opt/stacks/portal
    state: present
    pull: missing
  when: portal_flag.stat.exists

- name: Ensure portal stack is down (if disabled)
  community.docker.docker_compose_v2:
    project_src: /opt/stacks/portal
    state: absent
  when: not portal_flag.stat.exists
  failed_when: false
