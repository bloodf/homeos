---
- name: Install zsh
  ansible.builtin.apt:
    name: zsh
    state: present

- name: Set admin login shell to zsh
  ansible.builtin.user:
    name: "{{ admin_user }}"
    shell: /usr/bin/zsh

- name: Install oh-my-zsh (unattended)
  ansible.builtin.shell: |
    set -e
    if [ ! -d "{{ admin_home }}/.oh-my-zsh" ]; then
      su - {{ admin_user }} -c 'sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended'
    fi
  args:
    executable: /bin/bash
    creates: "{{ admin_home }}/.oh-my-zsh"

- name: Clone zsh-autosuggestions
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: "{{ admin_home }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    depth: 1
    version: master
  become_user: "{{ admin_user }}"

- name: Clone zsh-syntax-highlighting
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting
    dest: "{{ admin_home }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    depth: 1
    version: master
  become_user: "{{ admin_user }}"

- name: Install starship
  ansible.builtin.shell: |
    set -e
    if ! command -v starship >/dev/null 2>&1; then
      curl -fsSL https://starship.rs/install.sh | sh -s -- -y
    fi
  args:
    executable: /bin/bash
    creates: /usr/local/bin/starship

- name: Drop starship config
  ansible.builtin.copy:
    src: starship.toml
    dest: "{{ admin_home }}/.config/starship.toml"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0644'

- name: Drop homeos zshrc snippet
  ansible.builtin.copy:
    src: homeos.zsh
    dest: "{{ admin_home }}/.config/homeos.zsh"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0644'

- name: Wire .zshrc
  ansible.builtin.blockinfile:
    path: "{{ admin_home }}/.zshrc"
    create: true
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0644'
    marker: "# {mark} HOMEOS"
    block: |
      ZSH_THEME=""
      plugins=(git docker docker-compose fzf zsh-autosuggestions zsh-syntax-highlighting)
      source $ZSH/oh-my-zsh.sh
      eval "$(starship init zsh)"
      [ -f ~/.config/homeos.zsh ] && source ~/.config/homeos.zsh
      [ -f ~/.config/homeos/secrets.env ] && set -a && source ~/.config/homeos/secrets.env && set +a
      [ -d /home/linuxbrew/.linuxbrew ] && eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
