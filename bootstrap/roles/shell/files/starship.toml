format = """
[╭─](bold cyan)$username$hostname$directory$git_branch$git_status
[╰─](bold cyan)$character"""

[username]
show_always = true
style_user = "bold yellow"

[hostname]
ssh_only = false
format = "@[$hostname](bold red) "

[directory]
truncation_length = 4
truncate_to_repo = false
style = "bold cyan"

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"
