---
- name: restart cosmos docker shim
  ansible.builtin.shell: |
    if [ -f /var/lib/homeos/cosmos.enabled ]; then
      systemctl daemon-reload
      systemctl stop homeos-cosmos.service || true
      systemctl restart homeos-cosmos-docker-shim.service
      systemctl start homeos-cosmos.service
    fi
  changed_when: false
  failed_when: false
