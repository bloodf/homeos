---
# Cosmos Cloud — alternative portal. Toggle via:
#   sudo homeos config cosmos on
# Disable with:
#   sudo homeos config cosmos off
# Flag at /var/lib/homeos/cosmos.enabled controls whether bootstrap brings
# the stack up on this run. Disabled by default.

- name: Cosmos directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"
  loop:
    - /opt/stacks/cosmos
    - /srv/cosmos
    - /srv/cosmos/config
    - /srv/cosmos/data

- name: Install Cosmos Docker socket shim
  ansible.builtin.copy:
    src: homeos-cosmos-docker-shim
    dest: /usr/local/sbin/homeos-cosmos-docker-shim
    mode: "0755"
  register: cosmos_shim_script

- name: Cosmos Docker socket shim systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/homeos-cosmos-docker-shim.service
    mode: "0644"
    content: |
      [Unit]
      Description=HomeOS Cosmos Docker socket audit shim
      Documentation=file:/opt/homeos/docs/AI-GATE.md
      After=docker.service
      Wants=docker.service

      [Service]
      Type=simple
      ExecStart=/usr/local/sbin/homeos-cosmos-docker-shim
      Restart=always
      RestartSec=2s

      [Install]
      WantedBy=multi-user.target
  register: cosmos_shim_unit

- name: Cosmos docker-compose
  ansible.builtin.template:
    src: cosmos-compose.yml.j2
    dest: /opt/stacks/cosmos/docker-compose.yml
    mode: "0644"
  register: cosmos_compose_file

- name: Cosmos stack systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/homeos-cosmos.service
    mode: "0644"
    content: |
      [Unit]
      Description=HomeOS Cosmos stack
      Documentation=file:/opt/homeos/docs/AI-GATE.md
      Requires=docker.service homeos-cosmos-docker-shim.service
      After=docker.service homeos-cosmos-docker-shim.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/stacks/cosmos
      ExecStartPre=/bin/systemctl start homeos-cosmos-docker-shim.service
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down
      TimeoutStartSec=0

      [Install]
      WantedBy=multi-user.target
  register: cosmos_stack_unit

- name: Check cosmos enable flag
  ansible.builtin.stat:
    path: /var/lib/homeos/cosmos.enabled
  register: cosmos_flag

- name: Stop legacy Cosmos bypass audit reader
  ansible.builtin.systemd:
    name: homeos-cosmos-audit.service
    enabled: false
    state: stopped
    daemon_reload: true
  failed_when: false

- name: Stop Cosmos stack before shim socket replacement (only if enabled)
  ansible.builtin.systemd:
    name: homeos-cosmos.service
    state: stopped
    daemon_reload: true
  when:
    - cosmos_flag.stat.exists
    - cosmos_shim_script.changed or cosmos_shim_unit.changed
  failed_when: false

- name: Restart Cosmos Docker socket shim after updates (only if enabled)
  ansible.builtin.systemd:
    name: homeos-cosmos-docker-shim.service
    state: restarted
    daemon_reload: true
  when:
    - cosmos_flag.stat.exists
    - cosmos_shim_script.changed or cosmos_shim_unit.changed
  failed_when: false

- name: Enable Cosmos Docker socket shim (only if enabled)
  ansible.builtin.systemd:
    name: homeos-cosmos-docker-shim.service
    enabled: true
    state: started
    daemon_reload: true
  when: cosmos_flag.stat.exists

- name: Restart Cosmos stack after stack or shim updates (only if enabled)
  ansible.builtin.systemd:
    name: homeos-cosmos.service
    state: restarted
    daemon_reload: true
  when:
    - cosmos_flag.stat.exists
    - cosmos_stack_unit.changed or cosmos_compose_file.changed or cosmos_shim_script.changed or cosmos_shim_unit.changed
  failed_when: false

- name: Enable Cosmos stack unit (only if enabled)
  ansible.builtin.systemd:
    name: homeos-cosmos.service
    enabled: true
    state: started
    daemon_reload: true
  when: cosmos_flag.stat.exists

- name: Disable Cosmos stack unit (if disabled)
  ansible.builtin.systemd:
    name: homeos-cosmos.service
    enabled: false
    state: stopped
    daemon_reload: true
  when: not cosmos_flag.stat.exists
  failed_when: false

- name: Ensure cosmos stack is down (if disabled)
  community.docker.docker_compose_v2:
    project_src: /opt/stacks/cosmos
    state: absent
  when: not cosmos_flag.stat.exists
  failed_when: false

- name: Disable Cosmos Docker socket shim (if disabled)
  ansible.builtin.systemd:
    name: homeos-cosmos-docker-shim.service
    enabled: false
    state: stopped
    daemon_reload: true
  when: not cosmos_flag.stat.exists
  failed_when: false
