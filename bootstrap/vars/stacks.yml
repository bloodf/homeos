---
# Docker compose stacks under /opt/stacks/<name>/.
# Each entry has a template (templates/stacks/<name>/docker-compose.yml.j2)
# rendered into /opt/stacks/<name>/docker-compose.yml.

stacks:
  - name: homeassistant
    enabled: true
    watchtower: false   # HA upgrades require manual changelog review
  - name: jellyfin
    enabled: true
    watchtower: true
  - name: vaultwarden
    enabled: true
    watchtower: false   # treat password vault as critical
  - name: watchtower
    enabled: true
    watchtower: false
