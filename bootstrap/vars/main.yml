---
# HomeOS pinned versions. Update via `make refresh-pins`.

node_major: "24"

casaos_version: "v0.4.15"   # bump after manual smoke-test

tailscale_channel: "stable"

cockpit_45drives_repo: "https://repo.45drives.com/lists/45drives.sources"

caddy_apt_keyring: "https://dl.cloudsmith.io/public/caddy/stable/gpg.key"
caddy_apt_repo: "https://dl.cloudsmith.io/public/caddy/stable/deb/debian"

# AI CLIs
ai_clis_npm:
  - "@anthropic-ai/claude-code"
  - "@openai/codex"
  - "@google/gemini-cli"

ai_clis_brew:
  # try brew taps first, fall back handled in role
  - { tap: "sst/tap",        formula: "opencode" }

ai_clis_curl:
  - { name: "cursor-agent", url: "https://cursor.com/install",      shell: "bash", curl_flags: "-fsS" }
  - { name: "kimi",         url: "https://code.kimi.com/install.sh", shell: "bash", curl_flags: "-fsSL" }

ai_clis_pipx: []

# GitHub tools — clone + build under /opt/tools/<name>
github_tools:
  - { name: "hindsight",          repo: "https://github.com/vectorize-io/hindsight.git",          ref: "84c33b104d485d8c85b895f3f25589820ab03186",   build: "node" }
  - { name: "code-review-graph",  repo: "https://github.com/tirth8205/code-review-graph.git",      ref: "0919071a9ba353e604981059e99ee2ed98768092",   build: "pipx" }
  - { name: "portless",           repo: "https://github.com/vercel-labs/portless.git",             ref: "4522cf70c94d4569cfcf7e58af5b733579baed08",   build: "node" }
  - { name: "claude-context",     repo: "https://github.com/zilliztech/claude-context.git",        ref: "ead19f4ad66da78243dd9e126de121c19b7874e6",   build: "node" }
  - { name: "utoo",               repo: "https://github.com/utooland/utoo.git",                    ref: "73beec0ac68c0fddc9c4e12d38d2626ad8b8a8f1",   build: "auto" }
  - { name: "hermes-agent",       repo: "https://github.com/NousResearch/hermes-agent.git",        ref: "c5b4c481656634ff919b214a037b830077d3bbd1",   build: "pipx" }
  - { name: "OpenViking",         repo: "https://github.com/volcengine/OpenViking.git",            ref: "4d6f5b65bd24185c769ea8b81c4a86b6fca97ff2",   build: "compose" }
  - { name: "oh-my-opencode",     repo: "https://github.com/opensoft/oh-my-opencode.git",          ref: "aead4aebd28abf0be5e17f075d66eb76faacf083",   build: "clone-only", dest: "{{ admin_home }}/.config/opencode/plugins/oh-my-opencode" }
  - { name: "oh-my-claudecode",   repo: "https://github.com/yeachan-heo/oh-my-claudecode.git",     ref: "1e9f197bcc85602da87ad35b18d908a0575b8583",   build: "clone-only", dest: "{{ admin_home }}/.claude/oh-my-claudecode" }
  - { name: "claude-mem",         repo: "https://github.com/thedotmack/claude-mem.git",            ref: "28b40c05f2e1316948453b10e4feecce01817b6c",   build: "claude-mem" }

# Firewall ports (UFW)
firewall_allow_tcp:
  - 22       # ssh
  - 80       # http
  - 443      # https
  - 445      # samba
  - 139      # samba netbios
  - 2049     # nfs
  - 8123     # home assistant
  - 8096     # jellyfin
  - 9090     # cockpit
  - 81       # casaos

firewall_allow_udp:
  - 137      # samba netbios-ns
  - 138      # samba netbios-dgm
  - 2049     # nfs
  - 5353     # mDNS / avahi
  - 1900     # SSDP / DLNA (jellyfin)
  - 7359     # jellyfin auto-discovery

# Brew formulas baseline
brew_formulas:
  - gh
  - lazygit
  - lazydocker
  - neovim
  - eza
  - bat
  - delta
  - dust
  - procs
  - tokei
