name: Universal Installer CI

on:
  push:
    branches: ["main"]
    paths:
      - "universal-installer/**"
      - "Makefile"
      - ".github/workflows/installer-ci.yml"
  pull_request:
    paths:
      - "universal-installer/**"
      - "Makefile"
      - ".github/workflows/installer-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static:
    name: Static checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Static checks
        run: make check

  smoke:
    name: Debian container smoke
    runs-on: ubuntu-24.04
    needs: static
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Fast installer safety smoke
        run: make smoke
